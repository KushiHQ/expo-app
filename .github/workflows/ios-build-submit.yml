name: Build and Submit iOS
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[ios]')
    runs-on: macos-15
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # NOTE: react-native-vision-camera@5.x uses iOS 26 SDK APIs and requires Xcode 26.
      # GitHub-hosted macos-15 runners only ship with Xcode 16.x. Until GitHub adds a
      # macos-15/Xcode-26 runner image, local builds will fail at the VisionCamera Swift
      # compile step. Options:
      #   a) Use a self-hosted runner with Xcode 26 installed.
      #   b) Downgrade to react-native-vision-camera@4.x (works with Xcode 16).
      #   c) Watch https://github.com/actions/runner-images for an xcode-26 image.
      # The step below selects the latest stable Xcode available on the runner.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create .env file
        run: echo '${{ secrets.ENV_FILE }}' > .env

      - name: Decode Google Services Plist
        run: echo "${{ secrets.GOOGLE_SERVICES_IOS_BASE64 }}" | base64 --decode > GoogleService-Info.plist

      - name: Clean native build artifacts
        run: |
          rm -rf ios/Pods ios/build
          # Do NOT delete Podfile.lock — it pins pod versions for reproducible installs

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ~/.cocoapods
          key: cocoapods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: cocoapods-

      - name: Build iOS (local)
        run: |
          set -o pipefail
          touch /tmp/.build_start
          eas build --platform ios --profile production --local --non-interactive 2>&1 | tee /tmp/eas-output.txt || true
          IPA_PATH=$(find "$GITHUB_WORKSPACE" /private/var/folders /tmp -name "*.ipa" -newer /tmp/.build_start 2>/dev/null | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "❌ Could not locate built .ipa file"
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          echo "✅ Built IPA: $IPA_PATH"
        env:
          DEBUG: expo:*

      - name: Submit to App Store
        run: eas submit --platform ios --profile production --non-interactive --path "$IPA_PATH"
        env:
          # Generate an app-specific password at appleid.apple.com and add it as a repo secret.
          # Alternatively store an ASC API key in EAS (eas credentials) and remove this env var.
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
