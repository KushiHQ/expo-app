name: Build and Submit iOS
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[ios]') }}
    runs-on: macos-15
    environment: production
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # NOTE: react-native-vision-camera@5.x uses iOS 26 SDK APIs and requires Xcode 26.
      # GitHub-hosted macos-15 runners only ship with Xcode 16.x. Until GitHub adds a
      # macos-15/Xcode-26 runner image, local builds will fail at the VisionCamera Swift
      # compile step. Options:
      #   a) Use a self-hosted runner with Xcode 26 installed.
      #   b) Downgrade to react-native-vision-camera@4.x (works with Xcode 16).
      #   c) Watch https://github.com/actions/runner-images for an xcode-26 image.
      # The step below selects the latest stable Xcode available on the runner.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create .env file
        run: echo '${{ secrets.ENV_FILE }}' > .env

      - name: Decode Google Services Plist
        run: echo "${{ secrets.GOOGLE_SERVICES_IOS_BASE64 }}" | base64 --decode > GoogleService-Info.plist

      - name: Clean native build artifacts
        run: |
          rm -rf ios/Pods ios/build
          # Do NOT delete Podfile.lock — it pins pod versions for reproducible installs

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ~/.cocoapods
          key: cocoapods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: cocoapods-

      - name: Build iOS (local)
        run: |
          set -o pipefail
          eas build --platform ios --profile production --local --non-interactive 2>&1 | tee /tmp/eas-output.txt || true
          IPA_PATH=$(grep -oE '[^[:space:]]+\.ipa' /tmp/eas-output.txt | tail -1)
          if [ -z "$IPA_PATH" ] || [ ! -f "$IPA_PATH" ]; then
            echo "❌ Could not locate built .ipa file"
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          echo "✅ Built IPA: $IPA_PATH"
        env:
          DEBUG: expo:*

      - name: Extract build number
        run: |
          IPA_TMP=$(mktemp -d)
          unzip -q "$IPA_PATH" -d "$IPA_TMP"
          PLIST=$(find "$IPA_TMP/Payload" -maxdepth 2 -name "Info.plist" | head -1)
          BUILD_NUMBER=$(plutil -extract CFBundleVersion raw "$PLIST" 2>/dev/null | tr -d '\n' || echo "unknown")
          rm -rf "$IPA_TMP"
          echo "BUILD_NUMBER=${BUILD_NUMBER:-unknown}" >> "$GITHUB_ENV"

      - name: Submit to App Store
        timeout-minutes: 5
        continue-on-error: true
        run: eas submit --platform ios --profile production --non-interactive --path "$IPA_PATH" || true
        env:
          # Generate an app-specific password at appleid.apple.com and add it as a repo secret.
          # Alternatively store an ASC API key in EAS (eas credentials) and remove this env var.
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Notify Discord
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            TITLE="✅ Kushi iOS build submitted to App Store"
            COLOR=3581519
          else
            TITLE="❌ Kushi iOS build failed"
            COLOR=13369344
          fi
          jq -n \
            --arg title "$TITLE" \
            --argjson color "$COLOR" \
            --arg branch "$BRANCH" \
            --arg commit "$COMMIT_MSG" \
            --arg actor "$ACTOR" \
            --arg build "$BUILD_NUMBER" \
            --arg run_url "$RUN_URL" \
            '{embeds:[{title:$title,color:$color,fields:[
              {name:"Branch",value:$branch,inline:true},
              {name:"Commit",value:$commit,inline:true},
              {name:"Actor",value:$actor,inline:true},
              {name:"Build",value:$build,inline:true},
              {name:"Run",value:"[\("View logs")](\($run_url))",inline:true}
            ]}]}' \
          | curl -sSf -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK_URL"
