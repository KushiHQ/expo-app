name: Build Android (Staging)

on:
  workflow_dispatch:
  push:
    branches:
      - staging

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[android]')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: staging
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create .env file
        run: echo '${{ secrets.ENV_FILE }}' > .env

      - name: Decode Google Services JSON
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > google-services.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Android (local)
        run: |
          set -o pipefail
          eas build --platform android --profile preview --local --non-interactive 2>&1 | tee /tmp/eas-output.txt || true
          APK_PATH=$(grep -oE '[^[:space:]]+\.apk' /tmp/eas-output.txt | tail -1)
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "❌ Could not locate built .apk file"
            exit 1
          fi
          echo "APK_PATH=$APK_PATH" >> "$GITHUB_ENV"
          echo "✅ Built APK: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kushi-android-staging-${{ github.run_number }}
          path: ${{ env.APK_PATH }}
          retention-days: 14

      - name: Notify Discord
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            TITLE="🟡 Kushi Android staging build ready"
            COLOR=15117312
          else
            TITLE="❌ Kushi Android staging build failed"
            COLOR=13369344
          fi
          jq -n \
            --arg title "$TITLE" \
            --argjson color "$COLOR" \
            --arg branch "$BRANCH" \
            --arg commit "$COMMIT_MSG" \
            --arg actor "$ACTOR" \
            --arg run_url "$RUN_URL" \
            '{embeds:[{title:$title,color:$color,fields:[
              {name:"Branch",value:$branch,inline:true},
              {name:"Commit",value:$commit,inline:true},
              {name:"Actor",value:$actor,inline:true},
              {name:"Run",value:"[\("View logs")](\($run_url))",inline:true}
            ]}]}' \
          | curl -sSf -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK_URL"
