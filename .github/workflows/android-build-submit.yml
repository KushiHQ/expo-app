name: Build and Submit Android
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create .env file
        run: echo '${{ secrets.ENV_FILE }}' > .env

      - name: Decode Google Services JSON
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > google-services.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Android (local)
        run: |
          set -o pipefail
          touch /tmp/.build_start
          eas build --platform android --profile production --local --non-interactive 2>&1 | tee /tmp/eas-output.txt
          AAB_PATH=$(find "$GITHUB_WORKSPACE" /tmp -name "*.aab" -newer /tmp/.build_start 2>/dev/null | head -1)
          if [ -z "$AAB_PATH" ]; then
            echo "❌ Could not locate built .aab file"
            exit 1
          fi
          echo "AAB_PATH=$AAB_PATH" >> "$GITHUB_ENV"
          echo "✅ Built AAB: $AAB_PATH"

      - name: Decode Google Play key
        run: echo "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_BASE64 }}" | base64 --decode > google-play-key.json

      - name: Submit to Play Store
        run: eas submit --platform android --profile production --non-interactive --path "$AAB_PATH"
